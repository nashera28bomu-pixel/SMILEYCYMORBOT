<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYMOR AI | Intelligent Nexus</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ===================================
           CORE RESET - PREVENTS SCROLL BUGS
        =================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Stops the whole page from scrolling */
            background: #000;
            font-family: 'Outfit', sans-serif;
        }

        /* ===================================
           LOGIN SCREEN (RESTORED)
        =================================== */
        .login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1a0000, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            width: 90%;
            max-width: 380px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 0, 51, 0.3);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .login-box h1 { font-family: 'Orbitron'; color: #ff0033; letter-spacing: 2px; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; background: #ff0033; border: none; color: #fff; font-weight: bold; border-radius: 10px; }

        /* ===================================
           APP LAYOUT (THE FIX)
        =================================== */
        #app {
            display: none;
            height: 100vh; /* Fixed height to viewport */
            width: 100vw;
            flex-direction: column; /* Stack header, chips, box, input */
            background: radial-gradient(circle at top, #1a0000 0%, #020617 60%);
        }

        .chat-header {
            flex-shrink: 0; /* Header never shrinks */
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 170, 0.1);
        }

        .suggestion-chips {
            flex-shrink: 0; /* Chips never shrink */
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .suggestion-chips::-webkit-scrollbar { display: none; }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 170, 0.2);
            color: #00ffaa;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            white-space: nowrap;
        }

        /* THE MAGIC FIX: Chat box grows/shrinks, others stay fixed */
        .chat-box {
            flex: 1; 
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* Message Styling */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .message.user { align-self: flex-end; background: #004e92; color: #fff; border-bottom-right-radius: 4px; }
        .message.bot { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,170,0.15); border-bottom-left-radius: 4px; }

        /* INPUT SECTION: Fixed at the very bottom */
        .input-section {
            flex-shrink: 0; /* Input area never shrinks or moves */
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #0a0e14;
            border-top: 1px solid rgba(0, 255, 170, 0.1);
        }

        #userInput {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            padding: 12px 18px;
            border-radius: 25px;
            color: #fff;
            outline: none;
            font-size: 16px; /* Prevents iOS zoom-in on focus */
        }

        #sendBtn {
            width: 45px;
            height: 45px;
            background: #00ffaa;
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>CYMOR AI</h1>
            <p style="color: #666; font-size: 12px; margin-bottom: 15px;">NEURAL ACCESS TERMINAL</p>
            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="window.handleSignup()">Create Account</button>
            <button onclick="window.handleLogin()" style="background:transparent; border: 1px solid #ff0033; margin-top: 8px;">Login</button>
        </div>
    </div>

    <div id="app">
        <header class="chat-header">
            <div>
                <div style="font-family: Orbitron; color: #00ffaa; font-weight: bold; font-size: 18px;">CYMOR AI</div>
                <div style="font-size: 9px; color: #555; text-transform: uppercase;">Neural Intelligence Interface</div>
            </div>
            <div style="color: #ff0033; font-size: 10px; font-weight: bold; border: 1px solid #ff0033; padding: 2px 6px; border-radius: 4px;">LIVE</div>
            <span id="userName" style="display:none;"></span>
        </header>

        <div class="suggestion-chips">
            <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
            <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
            <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
            <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-section">
            <input id="userInput" placeholder="Transmit message..." onkeydown="window.handleKey(event)">
            <button id="sendBtn" onclick="window.sendMessage()">➤</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
