<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYMOR AI | Intelligent Nexus</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Essential Layout Fixes */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents double scrolling */
            background: #020617;
        }

        /* Login Screen stays on top */
        .login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1a0000, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* Main App Container */
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* This is the key: The chat box takes all space EXCEPT the header and input */
        .chat-box {
            flex: 1; 
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(10, 15, 30, 0.4);
        }

        /* Ensure input section is always visible at the very bottom */
        .input-section {
            padding: 15px;
            background: rgba(10, 14, 20, 0.95);
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(255, 0, 51, 0.1);
            position: sticky;
            bottom: 0;
        }

        /* Suggestion Chips styling */
        .suggestion-chips {
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            background: rgba(10, 14, 20, 0.6);
        }
        
        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 170, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            white-space: nowrap;
        }

        /* Copy existing login box styles here if they aren't in style.css */
        .login-box { width: 90%; max-width: 360px; padding: 30px; border-radius: 18px; background: rgba(10, 15, 30, 0.7); border: 1px solid rgba(255, 0, 51, 0.3); text-align: center; }
        .login-box h1 { font-family: 'Orbitron'; color: #ff0033; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; background: #ff0033; border: none; color: #fff; border-radius: 10px; font-weight: bold; }
    </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>CYMOR AI</h1>
        <p style="color:#aaa; font-size:13px; margin-bottom: 20px;">Neural Access Terminal</p>
        <input type="text" id="name" placeholder="Full Name (For Signup)">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="window.handleSignup()">Create Account</button>
        <button onclick="window.handleLogin()">Login</button>
    </div>
</div>

<div class="main-container" id="app" style="display:none;">
    <section class="chat-panel">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #0a0e14;">
            <div>
                <div class="chat-title" style="font-family:'Orbitron'; color: #00ffaa; font-weight: bold;">CYMOR AI</div>
                <div class="chat-subtitle" style="font-size: 10px; color: #666;">Neural Intelligence Interface</div>
            </div>
            <div class="live-badge" style="color: #ff0033; border: 1px solid #ff0033; padding: 2px 5px; font-size: 10px;">LIVE</div>
            <span id="userName" style="display:none;"></span>
        </div>

        <div class="suggestion-chips">
            <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
            <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
            <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
            <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Transmit message..." onkeydown="window.handleKey(event)" 
                   style="flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px;">
            <button onclick="window.sendMessage()" id="sendBtn" 
                    style="background: #00ffaa; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">➤</button>
        </div>
    </section>
</div>

<script type="module">
    import { signUp, loginEmail } from "./auth.js";
    window.handleSignup = async () => { /* signup logic */ };
    window.handleLogin = async () => { /* login logic */ };
</script>
<script type="module" src="script.js"></script>

</body>
</html>
