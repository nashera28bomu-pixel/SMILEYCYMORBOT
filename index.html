<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYMOR AI | Intelligent Nexus</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===================================
           RESET & CORE SETUP
        =================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #020617;
            --panel: rgba(10, 15, 30, 0.82);
            --green: #00ffaa;
            --red: #ff0033;
            --cyan: #00e5ff;
            --text: #f1f5f9;
            --botBubble: rgba(255, 255, 255, 0.07);
            --border: rgba(0, 255, 170, 0.14);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1a0000 0%, #020617 60%), #000;
            color: var(--text);
        }

        /* ===================================
           FLOATING BACKGROUND PARTICLES
        =================================== */
        .particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .particles span {
            position: absolute;
            color: rgba(0, 255, 170, 0.08);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(0, 255, 170, 0.15);
            animation: floatUp linear infinite;
        }

        .particles span:nth-child(1) { left: 5%; bottom: -10%; font-size: 20px; animation-duration: 14s; }
        .particles span:nth-child(2) { left: 25%; bottom: -15%; font-size: 18px; animation-duration: 18s; }
        .particles span:nth-child(3) { left: 45%; bottom: -10%; font-size: 22px; animation-duration: 15s; }
        .particles span:nth-child(4) { left: 65%; bottom: -18%; font-size: 19px; animation-duration: 19s; }
        .particles span:nth-child(5) { left: 85%; bottom: -12%; font-size: 21px; animation-duration: 16s; }

        @keyframes floatUp {
            from { transform: translateY(0); opacity: 0; }
            10%  { opacity: 1; }
            to   { transform: translateY(-140vh); opacity: 0; }
        }

        /* ===================================
           LOGIN SCREEN
        =================================== */
        .login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1a0000, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-box {
            width: 92%;
            max-width: 400px;
            padding: 35px;
            border-radius: 26px;
            background: rgba(10, 15, 30, 0.92);
            border: 1px solid rgba(255, 0, 51, 0.22);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 45px rgba(255, 0, 51, 0.12);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .login-box h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--red);
            font-size: 34px;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 18px rgba(255, 0, 51, 0.45);
        }

        .login-box p {
            color: #7c8594;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: none;
            outline: none;
            border-radius: 16px;
            background: #000;
            color: white;
            border: 1px solid #222;
            transition: 0.3s ease;
        }

        .login-box input:focus {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.18);
        }

        /* BUTTONS */
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .signup-btn {
            background: linear-gradient(135deg, #ff0033, #8b0000);
            color: white;
            box-shadow: 0 0 18px rgba(255, 0, 51, 0.25);
        }

        .login-main-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: white;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            color: black;
            margin-top: 14px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px) scale(1.01);
        }

        /* ===================================
           MAIN APPLICATION DASHBOARD
        =================================== */
        #app {
            display: none;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            inset: 0;
            z-index: 5;
        }

        .chat-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(5, 10, 20, 0.32);
            backdrop-filter: blur(18px);
        }

        /* HEADER */
        .chat-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 14, 20, 0.58);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--green);
            font-size: 19px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 255, 170, 0.35);
        }

        .logo-sub {
            color: #6b7280;
            font-size: 10px;
            margin-top: 3px;
        }

        .live-badge {
            color: var(--red);
            border: 1px solid var(--red);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(255, 0, 51, 0.25);
        }

        /* SUGGESTION CHIPS */
        .suggestion-chips {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 12px;
            scrollbar-width: none;
            background: rgba(0, 0, 0, 0.15);
        }

        .suggestion-chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 170, 0.15);
            color: var(--green);
            padding: 10px 14px;
            border-radius: 18px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 11px;
            transition: 0.25s ease;
        }

        .chip:hover {
            background: rgba(0, 255, 170, 0.12);
            transform: translateY(-2px);
        }

        /* CHAT CONTAINER */
        .chat-box {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 4px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 170, 0.2);
            border-radius: 20px;
        }

        /* MESSAGES */
        .message {
            max-width: 85%;
            padding: 15px 18px;
            border-radius: 22px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0080ff, #0045a6);
            color: #fff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 0 22px rgba(0, 119, 255, 0.2);
        }

        .message.bot {
            align-self: flex-start;
            background: var(--botBubble);
            border: 1px solid rgba(0, 255, 170, 0.12);
            color: #f8fafc;
            border-bottom-left-radius: 6px;
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===================================
           INTERACTION FOOTER INPUT (FIXED)
        =================================== */
        .input-section {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            width: 100%;
            max-width: 100vw;
            background: rgba(5, 10, 15, 0.92);
            border-top: 1px solid rgba(0, 255, 170, 0.08);
            backdrop-filter: blur(12px);
            z-index: 20;
            box-sizing: border-box;
        }

        #userInput {
            flex: 1;
            min-width: 0; /* Prevents overflow forcing button layout offscreen */
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 15px 18px;
            border-radius: 26px;
            font-size: 16px;
            transition: 0.3s ease;
        }

        #userInput:focus {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.16);
        }

        #userInput::placeholder {
            color: #777;
        }

        /* ATTACHMENT COMPONENT */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex-shrink: 0;
        }

        .upload-btn {
            width: 55px;
            height: 55px;
            border: 1px solid rgba(0, 255, 170, 0.3);
            border-radius: 50%;
            color: var(--green);
            background: rgba(0, 255, 170, 0.05);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.1);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn:hover {
            background: rgba(0, 255, 170, 0.15);
            border-color: var(--green);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.3);
        }

        /* SEND TRIGGER */
        #sendBtn {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            color: #001b13;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffaa, #00e5ff);
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.45), 0 0 28px rgba(0, 255, 170, 0.35);
            animation: glowPulse 1.8s infinite;
            transition: 0.3s ease;
        }

        #sendBtn:hover {
            transform: scale(1.08);
        }

        @keyframes glowPulse {
            0%   { box-shadow: 0 0 12px rgba(0, 255, 170, 0.45), 0 0 28px rgba(0, 255, 170, 0.35); }
            50%  { box-shadow: 0 0 22px rgba(0, 255, 170, 0.85), 0 0 50px rgba(0, 255, 170, 0.55), 0 0 80px rgba(0, 229, 255, 0.3); }
            100% { box-shadow: 0 0 12px rgba(0, 255, 170, 0.45), 0 0 28px rgba(0, 255, 170, 0.35); }
        }

        /* ===================================
           RESPONSIVE VIEWPORT ADAPTATIONS
        =================================== */
        @media(max-width: 768px) {
            .message {
                max-width: 90%;
            }
            .input-section {
                padding-bottom: calc(15px + env(safe-area-inset-bottom));
            }
            .login-box {
                padding: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- FLOATING BACKGROUND PARTICLES -->
    <div class="particles">
        <span>CYMOR AI</span>
        <span>CYMOR AI</span>
        <span>CYMOR AI</span>
        <span>CYMOR AI</span>
        <span>CYMOR AI</span>
    </div>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>CYMOR AI</h1>
            <p>NEURAL ACCESS TERMINAL</p>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">

            <button class="login-btn signup-btn" onclick="window.handleSignup()">Create Account</button>
            <button class="login-btn login-main-btn" onclick="window.handleLogin()">Login</button>
            
            <button class="login-btn google-btn" onclick="window.handleGoogleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Continue with Google
            </button>
        </div>
    </div>

    <!-- APP DASHBOARD PANEL -->
    <div id="app">
        <section class="chat-panel">
            <!-- HEADER -->
            <header class="chat-header">
                <div>
                    <div class="logo-title">CYMOR AI</div>
                    <div class="logo-sub">Neural Intelligence Interface</div>
                </div>
                <div class="live-badge">LIVE</div>
            </header>

            <!-- SUGGESTION QUICK-CHIPS -->
            <div class="suggestion-chips">
                <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
                <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
                <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
                <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
            </div>

            <!-- CHAT VIEWPORT -->
            <div class="chat-box" id="chatBox"></div>

            <!-- INPUT FIELD COMPONENT -->
            <div class="input-section">
                <div class="upload-btn-wrapper">
                    <button class="upload-btn">📎</button>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>

                <input id="userInput" placeholder="Transmit message..." onkeydown="window.handleKey(event)">
                <button id="sendBtn" onclick="window.sendMessage()">➤</button>
            </div>
        </section>
    </div>

    <!-- MODULE SCRIPTS -->
    <script type="module">
        import { googleLogin } from "./auth.js";

        /* GOOGLE LOGIN TERMINAL HOOK */
        window.handleGoogleLogin = async () => {
            try {
                await googleLogin();
            } catch(err) {
                alert(err.message);
                console.error(err);
            }
        };
    </script>
    <script type="module" src="script.js"></script>

</body>
</html>
