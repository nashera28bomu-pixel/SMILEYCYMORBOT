<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CymorAI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-green: #22c55e;
        --neon-blue: #38bdf8;
        --glass: rgba(30, 41, 59, 0.6);
    }

    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Main Glass Card */
    .app-card {
        width: 90%;
        max-width: 500px;
        height: 700px;
        background: var(--glass);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    header {
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header-title {
        font-size: 24px;
        font-weight: 600;
        color: var(--neon-green);
        text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    }

    .header-sub {
        font-size: 12px;
        color: var(--neon-blue);
        margin-top: 5px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .dashboard {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 15px 10px 5px 10px;
    }

    .shortcut {
        background: rgba(255,255,255,0.05);
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        transition: 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .shortcut:hover {
        background: var(--neon-blue);
        color: black;
    }

    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        scrollbar-width: none;
    }

    .message { margin-bottom: 15px; animation: fadeIn 0.3s ease; }
    .user { color: var(--neon-blue); text-align: right; }
    .bot { color: #fff; }

    .input-area {
        padding: 20px;
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 12px;
        color: white;
        outline: none;
    }

    button {
        background: var(--neon-green);
        border: none;
        padding: 0 20px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-card">
    <header>
        <div class="header-title">CYMOR AI</div>
        <div class="header-sub">CymorAI v1.0</div>
        
        <div class="dashboard">
            <span class="shortcut" onclick="setPrompt('Write a love letter')">❤️ Love</span>
            <span class="shortcut" onclick="setPrompt('Analyze this code')">💻 Code</span>
            <span class="shortcut" onclick="setPrompt('Help me plan')">📅 Plan</span>
        </div>
    </header>

    <div class="chat-container" id="chatBox">
        <div class="message bot">Hey there how can I assist you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    function setPrompt(text) { 
        document.getElementById("userInput").value = text; 
    }
    
    function handleKey(e) {
        if (e.key === "Enter") sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        if (!input.value.trim()) return;

        chatBox.innerHTML += `<div class="message user">${input.value}</div>`;
        input.value = "";

        // Placeholder logic for backend
        chatBox.innerHTML += `<div class="message bot">Thinking...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
