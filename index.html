<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>CYMOR AI | Intelligent Nexus</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===================================
   RESET
=================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

/* ===================================
   ROOT COLORS
=================================== */
:root{
    --bg:#020617;
    --panel:rgba(10,15,30,0.78);

    --green:#00ffaa;
    --red:#ff0033;
    --cyan:#00e5ff;

    --text:#f1f5f9;

    --userBubble:#0057d9;
    --botBubble:rgba(255,255,255,0.06);

    --border:rgba(0,255,170,0.12);
}

/* ===================================
   HTML / BODY
=================================== */
html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:'Outfit',sans-serif;

    background:
    radial-gradient(circle at top,#1a0000 0%,#020617 60%),
    #000;

    color:var(--text);
}

/* ===================================
   FLOATING CYMOR PARTICLES
=================================== */
.particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
}

.particles span{
    position:absolute;
    color:rgba(0,255,170,0.08);
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    text-shadow:0 0 12px rgba(0,255,170,0.15);

    animation:floatUp linear infinite;
}

.particles span:nth-child(1){
    left:5%;
    bottom:-10%;
    font-size:22px;
    animation-duration:15s;
}

.particles span:nth-child(2){
    left:25%;
    bottom:-20%;
    font-size:18px;
    animation-duration:18s;
}

.particles span:nth-child(3){
    left:45%;
    bottom:-15%;
    font-size:24px;
    animation-duration:14s;
}

.particles span:nth-child(4){
    left:65%;
    bottom:-25%;
    font-size:19px;
    animation-duration:20s;
}

.particles span:nth-child(5){
    left:85%;
    bottom:-15%;
    font-size:21px;
    animation-duration:16s;
}

@keyframes floatUp{

    from{
        transform:translateY(0);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-140vh);
        opacity:0;
    }
}

/* ===================================
   LOGIN SCREEN
=================================== */
.login-screen{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,#1a0000,#000);

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:100;
}

.login-box{
    width:90%;
    max-width:390px;

    padding:35px;

    border-radius:24px;

    background:rgba(10,15,30,0.88);

    border:1px solid rgba(255,0,51,0.25);

    backdrop-filter:blur(18px);

    box-shadow:
    0 0 40px rgba(255,0,51,0.08);

    text-align:center;
}

.login-box h1{
    font-family:'Orbitron',sans-serif;
    color:var(--red);

    margin-bottom:15px;

    letter-spacing:2px;

    text-shadow:
    0 0 15px rgba(255,0,51,0.45);
}

.login-box p{
    color:#777;
    font-size:12px;
    margin-bottom:18px;
}

.login-box input{
    width:100%;

    padding:14px;

    margin-bottom:12px;

    border:none;
    outline:none;

    border-radius:14px;

    background:#000;

    color:white;

    border:1px solid #222;
}

.login-box button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    margin-top:10px;

    font-weight:600;

    transition:0.3s ease;
}

.login-box button:first-of-type{
    background:var(--red);
    color:white;
}

.login-box button:last-of-type{
    background:transparent;
    border:1px solid var(--red);
    color:white;
}

.login-box button:hover{
    transform:translateY(-2px);
}

/* ===================================
   APP
=================================== */
#app{
    display:none;

    width:100vw;
    height:100dvh;

    position:fixed;
    inset:0;

    z-index:5;
}

/* ===================================
   CHAT PANEL
=================================== */
.chat-panel{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    overflow:hidden;

    background:rgba(5,10,20,0.35);

    backdrop-filter:blur(18px);
}

/* ===================================
   HEADER
=================================== */
.chat-header{
    flex-shrink:0;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:18px;

    border-bottom:1px solid var(--border);

    background:rgba(10,14,20,0.55);

    backdrop-filter:blur(12px);

    z-index:10;
}

.logo-title{
    font-family:'Orbitron',sans-serif;
    color:var(--green);

    font-size:18px;
    font-weight:700;

    letter-spacing:1px;

    text-shadow:
    0 0 15px rgba(0,255,170,0.3);
}

.logo-sub{
    color:#666;
    font-size:10px;
    margin-top:2px;
}

.live-badge{
    color:var(--red);

    border:1px solid var(--red);

    padding:4px 8px;

    border-radius:8px;

    font-size:10px;
    font-weight:700;

    box-shadow:
    0 0 12px rgba(255,0,51,0.25);
}

/* ===================================
   SUGGESTIONS
=================================== */
.suggestion-chips{
    flex-shrink:0;

    display:flex;
    gap:10px;

    overflow-x:auto;

    padding:12px;

    scrollbar-width:none;

    background:rgba(0,0,0,0.18);
}

.suggestion-chips::-webkit-scrollbar{
    display:none;
}

.chip{
    border:none;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(0,255,170,0.15);

    color:var(--green);

    padding:9px 14px;

    border-radius:18px;

    cursor:pointer;

    white-space:nowrap;

    font-size:11px;

    transition:0.25s ease;
}

.chip:hover{
    background:rgba(0,255,170,0.12);

    transform:translateY(-2px);
}

/* ===================================
   CHAT BOX
=================================== */
.chat-box{
    flex:1;

    min-height:0;

    overflow-y:auto;

    padding:18px;

    display:flex;
    flex-direction:column;

    gap:16px;

    scroll-behavior:smooth;

    z-index:5;
}

.chat-box::-webkit-scrollbar{
    width:4px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:rgba(0,255,170,0.2);
    border-radius:20px;
}

/* ===================================
   MESSAGES
=================================== */
.message{
    max-width:85%;

    padding:14px 18px;

    border-radius:20px;

    line-height:1.5;

    font-size:15px;

    word-wrap:break-word;

    animation:fadeIn 0.25s ease;
}

.message.user{
    align-self:flex-end;

    background:
    linear-gradient(
    135deg,
    #0077ff,
    #003e94
    );

    color:#fff;

    border-bottom-right-radius:5px;

    box-shadow:
    0 0 18px rgba(0,119,255,0.18);
}

.message.bot{
    align-self:flex-start;

    background:var(--botBubble);

    border:1px solid rgba(0,255,170,0.12);

    color:#f8fafc;

    border-bottom-left-radius:5px;

    box-shadow:
    0 0 12px rgba(0,255,170,0.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ===================================
   INPUT SECTION
=================================== */
.input-section{
    flex-shrink:0;

    display:flex;
    align-items:center;

    gap:12px;

    padding:15px;

    background:rgba(5,10,15,0.88);

    border-top:1px solid rgba(0,255,170,0.08);

    backdrop-filter:blur(12px);

    z-index:20;
}

/* INPUT */
#userInput{
    flex:1;

    border:none;
    outline:none;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    padding:14px 18px;

    border-radius:24px;

    font-size:16px;
}

#userInput::placeholder{
    color:#777;
}

/* ===================================
   GLOWING SEND BUTTON
=================================== */
#sendBtn{
    width:52px;
    height:52px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    flex-shrink:0;

    color:#001b13;

    font-size:20px;
    font-weight:700;

    background:
    linear-gradient(
    135deg,
    #00ffaa,
    #00e5ff
    );

    box-shadow:
    0 0 10px rgba(0,255,170,0.45),
    0 0 25px rgba(0,255,170,0.35),
    0 0 45px rgba(0,229,255,0.18);

    animation:glowPulse 1.8s infinite;
}

#sendBtn:hover{
    transform:scale(1.08);
}

@keyframes glowPulse{

    0%{
        box-shadow:
        0 0 10px rgba(0,255,170,0.45),
        0 0 25px rgba(0,255,170,0.35);
    }

    50%{
        box-shadow:
        0 0 20px rgba(0,255,170,0.85),
        0 0 45px rgba(0,255,170,0.55),
        0 0 70px rgba(0,229,255,0.3);
    }

    100%{
        box-shadow:
        0 0 10px rgba(0,255,170,0.45),
        0 0 25px rgba(0,255,170,0.35);
    }
}

/* ===================================
   MOBILE
=================================== */
@media(max-width:768px){

    .message{
        max-width:90%;
    }

    .input-section{
        padding-bottom:
        calc(
        15px +
        env(safe-area-inset-bottom)
        );
    }
}

</style>
</head>

<body>

<!-- FLOATING PARTICLES -->
<div class="particles">
    <span>CYMOR AI</span>
    <span>CYMOR AI</span>
    <span>CYMOR AI</span>
    <span>CYMOR AI</span>
    <span>CYMOR AI</span>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

    <div class="login-box">

        <h1>CYMOR AI</h1>

        <p>NEURAL ACCESS TERMINAL</p>

        <input type="text" id="name" placeholder="Full Name">

        <input type="email" id="email" placeholder="Email Address">

        <input type="password" id="password" placeholder="Password">

        <button onclick="window.handleSignup()">
            Create Account
        </button>

        <button onclick="window.handleLogin()">
            Login
        </button>

    </div>

</div>

<!-- MAIN APP -->
<div id="app">

<section class="chat-panel">

    <!-- HEADER -->
    <header class="chat-header">

        <div>

            <div class="logo-title">
                CYMOR AI
            </div>

            <div class="logo-sub">
                Neural Intelligence Interface
            </div>

        </div>

        <div class="live-badge">
            LIVE
        </div>

    </header>

    <!-- CHIPS -->
    <div class="suggestion-chips">

        <button class="chip"
        onclick="window.setPrompt('💻 CODE')">
            💻 CODE
        </button>

        <button class="chip"
        onclick="window.setPrompt('🚀 MOTIVATE')">
            🚀 MOTIVATE
        </button>

        <button class="chip"
        onclick="window.setPrompt('📅 PLAN')">
            📅 PLAN
        </button>

        <button class="chip"
        onclick="window.setPrompt('🧠 AI')">
            🧠 AI
        </button>

    </div>

    <!-- CHAT -->
    <div class="chat-box"
    id="chatBox"></div>

    <!-- INPUT -->
    <div class="input-section">

        <input
        id="userInput"
        placeholder="Ask Cymor AI..."
        onkeydown="window.handleKey(event)">

        <button
        id="sendBtn"
        onclick="window.sendMessage()">
            ➤
        </button>

    </div>

</section>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
