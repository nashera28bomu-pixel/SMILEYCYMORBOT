<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CYMOR AI | Intelligent Nexus</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================
   SAFE GLOBAL FIX
========================= */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #020617;
}

/* LOGIN SCREEN */
.login-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #1a0000, #000);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

/* MAIN APP ROOT */
#app {
    height: 100vh;
    width: 100vw;
    display: flex;
}

/* MAIN CONTAINER FIX */
.main-container {
    height: 100vh;
    width: 100%;
    display: flex;
    overflow: hidden;
}

/* CHAT PANEL FIX */
.chat-panel {
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* HEADER */
.chat-header {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #0a0e14;
}

/* SUGGESTIONS */
.suggestion-chips {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 10px;
    overflow-x: auto;
}

/* CHAT BOX (🔥 CRITICAL FIX) */
.chat-box {
    flex: 1;
    min-height: 0; /* IMPORTANT FIX */
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* INPUT ALWAYS FIXED */
.input-section {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 15px;
    background: rgba(10, 14, 20, 0.95);
    border-top: 1px solid rgba(255,0,51,0.1);
}

/* INPUT FIELD */
#userInput {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #333;
    background: #000;
    color: white;
    outline: none;
}

/* SEND BUTTON */
#sendBtn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #00ffaa;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>CYMOR AI</h1>
        <p style="color:#aaa;">Neural Access Terminal</p>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button onclick="window.handleSignup()">Create Account</button>
        <button onclick="window.handleLogin()">Login</button>
    </div>
</div>

<!-- APP -->
<div class="main-container" id="app" style="display:none;">
    <section class="chat-panel">

        <!-- HEADER -->
        <div class="chat-header">
            <div>
                <div style="font-family:Orbitron;color:#00ffaa;font-weight:bold;">CYMOR AI</div>
                <div style="font-size:10px;color:#666;">Neural Interface</div>
            </div>
            <div style="color:#ff0033;font-size:10px;">LIVE</div>
        </div>

        <!-- CHIPS -->
        <div class="suggestion-chips">
            <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
            <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
            <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
            <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
        </div>

        <!-- CHAT -->
        <div class="chat-box" id="chatBox"></div>

        <!-- INPUT -->
        <div class="input-section">
            <input id="userInput" placeholder="Ask Cymor AI..." onkeydown="window.handleKey(event)">
            <button id="sendBtn" onclick="window.sendMessage()">➤</button>
        </div>

    </section>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
