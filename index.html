<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYMOR AI | Intelligent Nexus</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* LOGIN SCREEN OVERLAY */
        .login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1a0000, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            width: 90%;
            max-width: 360px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 0, 51, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.2);
            backdrop-filter: blur(14px);
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ff0033;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 51, 0.5);
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 0, 51, 0.4);
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(45deg, #ff0033, #8b0000);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
        }

        /* Suggestion Chips Style */
        .suggestion-chips {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            background: rgba(10, 14, 20, 0.4);
        }
        .suggestion-chips::-webkit-scrollbar { display: none; }
        
        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 170, 0.2);
            color: #e2e8f0;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .chip:hover {
            background: rgba(0, 255, 170, 0.1);
            border-color: #00ffaa;
        }

        .live-badge {
            background: rgba(255, 0, 51, 0.1);
            color: #ff0033;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #ff0033;
        }

        /* Layout Fix: Ensure app occupies full viewport */
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>CYMOR AI</h1>
        <p style="color:#aaa; font-size:13px; margin-bottom: 20px;">Neural Access Terminal</p>

        <input type="text" id="name" placeholder="Full Name (For Signup)">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter'){window.handleLogin()}">

        <button onclick="window.handleSignup()">Create Account</button>
        <button onclick="window.handleLogin()">Login</button>
        <button style="background:transparent; border: 1px solid #444;" onclick="window.handleGoogleLogin()">Continue with Google</button>
    </div>
</div>

<div class="main-container" id="app" style="display:none;">
    <section class="chat-panel">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255, 0, 51, 0.1);">
            <div>
                <div class="chat-title" style="font-family:'Orbitron'; font-weight: bold; color: #00ffaa;">CYMOR AI</div>
                <div class="chat-subtitle" style="font-size: 10px; opacity: 0.6;">Neural Intelligence Interface</div>
            </div>
            <div class="live-badge">LIVE</div>
            <span id="userName" style="display:none;"></span>
        </div>

        <div class="suggestion-chips">
            <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
            <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
            <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
            <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Transmit your message..." onkeydown="window.handleKey(event)">
            <button onclick="window.sendMessage()" id="sendBtn">➤</button>
        </div>
    </section>
</div>

<script type="module">
    import { signUp, loginEmail, googleLogin } from "./auth.js";

    window.handleSignup = async () => {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            await signUp(email, password, name);
        } catch (err) { alert(err.message); }
    };

    window.handleLogin = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            await loginEmail(email, password);
        } catch (err) { alert("Access Denied: " + err.message); }
    };

    window.handleGoogleLogin = async () => {
        try { await googleLogin(); } catch (err) { alert(err.message); }
    };
</script>

<script type="module" src="script.js"></script>

</body>
</html>
