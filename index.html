<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CymorAI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: 600;
    border-bottom: 1px solid #1e293b;
}

.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    margin: 10px 0;
    line-height: 1.5;
}

.user {
    color: #38bdf8;
}

.bot {
    color: #4ade80;
}

/* Typing dots */
.typing {
    display: inline-block;
}

.typing span {
    height: 8px;
    width: 8px;
    margin: 0 2px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.3s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

/* 🧠 CymorAI Thinking Brain */
.brain {
    display: inline-block;
    margin-left: 8px;
    font-size: 16px;
    animation: brainPulse 1.5s infinite ease-in-out;
}

@keyframes brainPulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
    50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(-10deg); opacity: 0.6; }
}

.input-area {
    display: flex;
    border-top: 1px solid #1e293b;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
    outline: none;
    background: #020617;
    color: white;
}

button {
    padding: 15px 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}

footer {
    text-align: center;
    font-size: 12px;
    padding: 10px;
    border-top: 1px solid #1e293b;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
    🤖 CymorAI
</header>

<div class="chat-container" id="chatBox">
    <div class="message bot">
        Welcome 👋<br>
        <strong>How may I help you today?</strong>
    </div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">Send</button>
</div>

<footer>
    © CymorTechServices | Site made by the Legendary Smiley Cymor
</footer>

<script>
function handleKey(e) {
    if (e.key === "Enter") sendMessage();
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    const userText = input.value.trim();
    if (!userText) return;

    chatBox.innerHTML += `<div class="message user">You: ${userText}</div>`;
    input.value = "";

    // 🧠 Typing + Brain animation
    const typingId = "typing-" + Date.now();
    chatBox.innerHTML += `
        <div class="message bot" id="${typingId}">
            CymorAI is thinking 
            <span class="brain">🧠</span>
            <span class="typing">
                <span></span><span></span><span></span>
            </span>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: userText })
        });

        const data = await response.json();

        // Remove typing animation
        document.getElementById(typingId).remove();

        // Show response
        chatBox.innerHTML += `<div class="message bot">CymorAI: ${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById(typingId).remove();
        chatBox.innerHTML += `<div class="message bot">Error getting response.</div>`;
    }
}
</script>

</body>
</html>
