<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYMOR AI | Intelligent Nexus</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== LOGIN OVERLAY ===== */
        .login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1a0000, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            width: 360px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 51, 0.3);
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.3);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ff0033;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px red;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: black;
            border: 1px solid #ff0033;
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box; 
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(45deg, #ff0033, #660000);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .login-box button:hover {
            transform: scale(1.03);
            background: linear-gradient(45deg, #ff1a4a, #800000);
        }

        .google-btn {
            background: black !important;
            border: 1px solid #ff0033 !important;
            margin-top: 15px !important;
        }

        /* ===== CHIP STYLING ===== */
        .suggestion-chips {
            display: flex;
            gap: 10px;
            padding: 15px 10px;
            overflow-x: auto;
            scrollbar-width: none; 
        }
        
        .suggestion-chips::-webkit-scrollbar {
            display: none; 
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 51, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: #ff0033;
            box-shadow: 0 0 15px #ff0033;
            transform: translateY(-2px);
        }

        /* Hidden by default until script.js handles the auth state */
        .main-container {
            display: none; 
        }
    </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>CYMOR AI</h1>
        <p style="color:#aaa; font-size:13px; margin-bottom: 20px;">Neural Access Terminal</p>

        <input type="text" id="name" placeholder="Full Name (For Signup)">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">

        <button onclick="handleSignup()">Create Account</button>
        <button onclick="handleLogin()">Login</button>

        <button class="google-btn" onclick="handleGoogleLogin()">
            Continue with Google
        </button>
    </div>
</div>

<div class="main-container" id="app">
    <section class="hero-panel">
        <div class="hero-content">
            <h1>CYMOR <span>AI</span></h1>
            <h2>INTELLIGENT NEXUS</h2>
            <p class="hero-description">
                Welcome, <span id="userName" style="color: #ff0033; font-weight: bold;">User</span>. CymorAI is ready.
            </p>
        </div>
    </section>

    <section class="chat-panel">
        <div class="chat-header">
            <div>
                <div class="chat-title">CYMOR AI</div>
                <div class="chat-subtitle">Neural Intelligence Interface</div>
            </div>
            <div class="live-badge">LIVE</div>
        </div>

        <div class="suggestion-chips">
            <button class="chip" onclick="window.setPrompt('💻 CODE')">💻 CODE</button>
            <button class="chip" onclick="window.setPrompt('🚀 MOTIVATE')">🚀 MOTIVATE</button>
            <button class="chip" onclick="window.setPrompt('📅 PLAN')">📅 PLAN</button>
            <button class="chip" onclick="window.setPrompt('🧠 AI')">🧠 AI</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Transmit your message..." onkeydown="window.handleKey(event)">
            <button onclick="window.sendMessage()" id="sendBtn">➤</button>
        </div>
    </section>
</div>

<script type="module">
    import { signUp, loginEmail, googleLogin } from "./auth.js";

    // Attach to window so HTML buttons can see them
    window.handleSignup = async () => {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            await signUp(email, password, name);
        } catch (err) { alert(err.message); }
    };

    window.handleLogin = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            await loginEmail(email, password);
        } catch (err) { alert(err.message); }
    };

    window.handleGoogleLogin = async () => {
        try {
            await googleLogin();
        } catch (err) { alert("Google Auth Failed"); }
    };
</script>

<script type="module" src="script.js"></script>

</body>
</html>
