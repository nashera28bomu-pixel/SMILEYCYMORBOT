<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cymor Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#0f172a;
    color:white;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
}
h1{text-align:center}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div id="stats" class="card">Loading stats...</div>
<div id="orders" class="card">Loading orders...</div>

<script>
const API_URL = "http://localhost:5000/api"; // change after deployment

// Password Protection
let pass = prompt("Enter Admin Password");
if(pass !== "bomu@09"){
    document.body.innerHTML = "<h2>Access Denied</h2>";
}

// Load Stats
async function loadStats(){
    let res = await fetch(`${API_URL}/stats`);
    let data = await res.json();

    document.getElementById("stats").innerHTML = `
        <h2>Total Orders: ${data.totalOrders}</h2>
        <h2>Total Earnings: Ksh ${data.totalEarnings}</h2>
    `;
}

// Load Orders
async function loadOrders(){
    let res = await fetch(`${API_URL}/orders`);
    let data = await res.json();

    let html = "<h2>Orders</h2>";

    data.forEach(o=>{
        html += `
        <p>
        🧾 ${o.product} <br>
        👤 ${o.name} <br>
        📞 ${o.phone} <br>
        📍 ${o.location} <br>
        💰 Ksh ${o.total} <br>
        📅 ${new Date(o.createdAt).toDateString()}
        </p>
        <hr>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

// Run
loadStats();
loadOrders();
</script>

</body>
</html>
