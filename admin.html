<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CymorAI Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* =======================
   GLOBAL
======================= */
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background: radial-gradient(circle at top,#1a0000,#020617);
    color:white;
    overflow-x:hidden;
}

/* =======================
   LOGIN GATE
======================= */
#loginGate{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginBox{
    padding:30px;
    border-radius:20px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 30px rgba(255,0,0,0.2);
    text-align:center;
}

.loginBox input{
    padding:12px;
    width:250px;
    border-radius:10px;
    border:1px solid red;
    background:black;
    color:white;
    margin-top:10px;
}

.loginBox button{
    margin-top:15px;
    padding:10px 20px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* =======================
   DASHBOARD
======================= */
.container{
    padding:20px;
}

h1{
    text-align:center;
    color:#ff0033;
    text-shadow:0 0 20px red;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,0,0,0.2);
    border-radius:15px;
    padding:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card h2{
    color:#00ff9d;
    font-size:18px;
}

/* CHAT BOX */
.chatBox{
    max-height:300px;
    overflow-y:auto;
    font-size:13px;
}

.msg{
    padding:8px;
    margin:5px 0;
    border-left:3px solid red;
    background:rgba(255,255,255,0.03);
}

/* CHART AREA */
canvas{
    background:rgba(0,0,0,0.3);
    border-radius:10px;
    padding:10px;
}

</style>
</head>

<body>

<!-- =======================
     PASSWORD GATE
======================= -->
<div id="loginGate">
    <div class="loginBox">
        <h2>🔐 CYMOR ADMIN ACCESS</h2>
        <p>Enter password to continue</p>

        <input type="password" id="pass" placeholder="Password">
        <br>
        <button onclick="checkPassword()">Enter</button>
    </div>
</div>

<!-- =======================
     DASHBOARD
======================= -->
<div class="container" id="dashboard" style="display:none;">

<h1>🚀 CYMORAI ANALYTICS DASHBOARD</h1>

<div class="grid">

    <div class="card">
        <h2>👥 Total Users</h2>
        <h1 id="usersCount">0</h1>
    </div>

    <div class="card">
        <h2>💬 Total Messages</h2>
        <h1 id="msgCount">0</h1>
    </div>

    <div class="card">
        <h2>⚡ AI Status</h2>
        <h3 style="color:#00ff9d;">ONLINE</h3>
    </div>

</div>

<div class="grid">

    <div class="card">
        <h2>📊 User Growth</h2>
        <canvas id="userChart"></canvas>
    </div>

    <div class="card">
        <h2>📈 Message Activity</h2>
        <canvas id="msgChart"></canvas>
    </div>

</div>

<div class="card" style="margin-top:20px;">
    <h2>💬 Live Chat Monitor</h2>
    <div class="chatBox" id="chatBox"></div>
</div>

</div>

<!-- =======================
     FIREBASE + LOGIC
======================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// =====================
// FIREBASE CONFIG (FIXED)
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyC48m4Mmksa8Fpx6OGDU8tAUIlCCqOE8Js",
  authDomain: "cymorai.firebaseapp.com",
  projectId: "cymorai",
  storageBucket: "cymorai.appspot.com",
  messagingSenderId: "718791176464",
  appId: "1:718791176464:web:159e5233fe709c518c3595"
};

// INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// PASSWORD CHECK
// =====================
window.checkPassword = function () {
    const pass = document.getElementById("pass").value;

    if (pass === "bomu@09") {
        document.getElementById("loginGate").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadDashboard();
    } else {
        alert("❌ Wrong password");
    }
};

// =====================
// LOAD DATA
// =====================
async function loadDashboard() {

    // USERS
    const usersSnap = await getDocs(collection(db, "users"));
    document.getElementById("usersCount").innerText = usersSnap.size;

    // MESSAGE COUNT (simple logic)
    let msgTotal = 0;

    usersSnap.forEach(doc => {
        const data = doc.data();
        if (data.chats) msgTotal += data.chats.length;
    });

    document.getElementById("msgCount").innerText = msgTotal;

    // =====================
    // CHARTS
    // =====================

    new Chart(document.getElementById("userChart"), {
        type: "line",
        data: {
            labels: ["Mon","Tue","Wed","Thu","Fri"],
            datasets: [{
                label: "Users",
                data: [5,10,20,35,usersSnap.size],
                borderColor: "red"
            }]
        }
    });

    new Chart(document.getElementById("msgChart"), {
        type: "bar",
        data: {
            labels: ["A","B","C","D","E"],
            datasets: [{
                label: "Messages",
                data: [10,20,15,30,msgTotal],
                backgroundColor: "red"
            }]
        }
    });

    // =====================
    // LIVE CHAT MONITOR
    // =====================
    onSnapshot(collection(db, "users"), (snapshot) => {

        let html = "";

        snapshot.forEach(doc => {
            const u = doc.data();

            html += `
                <div class="msg">
                    👤 ${u.name || "User"} <br>
                    ✉️ ${u.email || ""}<br>
                    🧠 Role: ${u.role || "user"}
                </div>
            `;
        });

        document.getElementById("chatBox").innerHTML = html;
    });
}

</script>

</body>
</html>
